name: CI/CD Pipeline

on:
  push:
    branches: ["master"]

jobs:
  build-deploy:
    runs-on: self-hosted   # ✅ changed from ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    # 1. Checkout
    - uses: actions/checkout@v3

    # 2. Login to GHCR
    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    # 3. Build Image (Multi-stage Dockerfile)
    - name: Build Image
      run: docker build -t ghcr.io/${{ github.repository }}/app:latest .

    # 4. Push Image
    - name: Push Image
      run: docker push ghcr.io/${{ github.repository }}/app:latest

    # 5. Stop old container
    - name: Stop old container
      run: |
        docker stop app || true
        docker rm app || true

    # 6. Run new container (from pushed image)
    - name: Run new container
      run: |
        docker run -d -p 3000:3000 --name app ghcr.io/${{ github.repository }}/app:latest
