name: CI/CD Pipeline 

on:
  push:
    branches: ["master"]

jobs:
  build-deploy:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
    # 1. Checkout
    - uses: actions/checkout@v3

    # 2. Login to GHCR
    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    # 3. Build Image (with cache)
    - name: Build Image
      run: |
        docker pull ghcr.io/${{ github.repository }}/app:latest || true
        docker build \
          --cache-from=ghcr.io/${{ github.repository }}/app:latest \
          -t ghcr.io/${{ github.repository }}/app:latest .

    # 4. Push Image
    - name: Push Image
      run: docker push ghcr.io/${{ github.repository }}/app:latest

    # 5. Pull latest image (clean deploy)
    - name: Pull latest image
      run: docker pull ghcr.io/${{ github.repository }}/app:latest

    # 6. Stop old container
    - name: Stop old container
      run: |
        docker stop app || true
        docker rm app || true

    # 🔥 NEW (optional safety - create network if not exists)
    - name: Ensure Network Exists
      run: docker network create paras-app || true

    # 7. Run new container (ONLY CHANGE = network added)
    - name: Run new container
      run: |
        docker run -d \
          --name app \
          --network paras-app \
          -p 8700:3000 \
          ghcr.io/${{ github.repository }}/app:latest

    # 8. Cleanup old images (optional but recommended)
    - name: Cleanup
      run: docker image prune -af
