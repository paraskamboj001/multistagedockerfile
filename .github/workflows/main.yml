name: CI/CD Pipeline

on:
  push:
    branches: ["master"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    # 1. Checkout
    - uses: actions/checkout@v3

    # 2. Login to GHCR
    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    # 3. Build Image (Multi-stage Dockerfile)
    - name: Build Image
      run: docker build -t ghcr.io/${{ github.repository }}/app:latest .

    # 4. Push Image
    - name: Push Image
      run: docker push ghcr.io/${{ github.repository }}/app:latest

    # 5. Deploy to EC2 (SSH)
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull ghcr.io/${{ github.repository }}/app:latest
          docker stop app || true
          docker rm app || true
          docker run -d -p 3000:3000 --name app ghcr.io/${{ github.repository }}/app:latest
